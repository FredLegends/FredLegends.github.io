<!DOCTYPE html>  
<html lang="ru">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1" />  
  <title>Курс «Блядо» v1.8</title>  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />  
  <style>  
    * {  
      margin: 0; padding: 0; box-sizing: border-box;  
    }  
    body {  
      font-family: 'Inter', Arial, sans-serif;  
      color: #fff;  
      background: #111;  
      transition: background-color 0.3s ease, color 0.3s ease;  
      min-height: 100vh;  
      display: flex;  
      flex-direction: column;  
      justify-content: flex-start;  
      align-items: center;  
      padding: 80px 20px 60px;  
    }  
    .container {  
      max-width: 800px;  
      width: 100%;  
      text-align: center;  
      animation: fadeIn 0.8s ease forwards;  
    }  
    h1 {  
      font-size: 2.8rem;  
      margin-bottom: 0.5em;  
      font-weight: 700;  
    }  
    p {  
      font-size: 1.15rem;  
      line-height: 1.5;  
      margin: 0.5em 0;  
    }  
    .btn {  
      display: inline-block;  
      background: #00f0ff;  
      color: #000;  
      padding: 0.75em 1.8em;  
      border-radius: 6px;  
      text-decoration: none;  
      margin: 0.6em;  
      font-weight: 700;  
      cursor: pointer;  
      transition: background-color 0.3s ease;  
      user-select: none;  
    }  
    .btn:hover {  
      background: #00d0dd;  
    }  
    footer {  
      font-size: 0.8rem;  
      color: #888;  
      text-align: center;  
      margin-top: auto;  
      position: fixed;  
      bottom: 10px;  
      left: 0;  
      right: 0;  
      padding: 5px;  
    }  
    .telegram, .profile-btn, .theme-btn {  
      position: fixed;  
      z-index: 10;  
      user-select: none;  
    }  
    .telegram {  
      left: 20px;  
      bottom: 57px;  
      background: #0088cc;  
      padding: 12px;  
      border-radius: 50%;  
      box-shadow: 0 0 10px #0088ccaa;  
    }  
    .telegram img {  
      width: 28px;  
      height: 28px;  
      display: block;  
    }  
    .theme-btn {  
      right: 20px;  
      bottom: 58px;  
      background: #555;  
      color: #fff;  
      padding: 0.45em 1em;  
      border-radius: 5px;  
      cursor: pointer;  
      font-size: 0.9rem;  
      transition: background-color 0.3s ease, color 0.3s ease;  
    }  
    .theme-btn:hover {  
      background: #777;  
    }  
    .profile-btn {  
      right: 20px;  
      top: 20px;  
      background: #00f0ff;  
      color: #000;  
      padding: 0.45em 1em;  
      border-radius: 5px;  
      cursor: pointer;  
      font-size: 0.9rem;  
      font-weight: 700;  
      transition: background-color 0.3s ease;  
    }  
    .profile-btn:hover {  
      background: #00d0dd;  
    }  
    .modal {  
      position: fixed;  
      top: 0; right: -100%;  
      width: 320px;  
      height: 100vh;  
      background: #1b1b1b;  
      padding: 20px;  
      overflow-y: auto;  
      transition: right 0.4s ease;  
      box-shadow: -4px 0 8px #0008;  
      z-index: 20;  
      display: flex;  
      flex-direction: column;  
    }  
    .modal.open {  
      right: 0;  
    }  
    .modal h3 {  
      margin-bottom: 1em;  
      font-weight: 700;  
      text-align: center;  
    }  
    .modal .avatar {  
      width: 70px;  
      height: 70px;  
      margin: 0 auto 0.6em;  
      border-radius: 50%;  
      background: #444 center/cover no-repeat;  
      cursor: pointer;  
      transition: box-shadow 0.3s ease;  
    }  
    .modal .avatar:hover {  
      box-shadow: 0 0 10px #00f0ffaa;  
    }  
    .modal input, .modal button {  
      width: 100%;  
      margin: 0.5em 0;  
      padding: 0.7em;  
      border: none;  
      border-radius: 5px;  
      font-size: 1rem;  
    }  
    .modal input {  
      background: #333;  
      color: #eee;  
    }  
    .modal button {  
      background: #00f0ff;  
      color: #000;  
      font-weight: 700;  
      cursor: pointer;  
      transition: background-color 0.3s ease;  
    }  
    .modal button:hover {  
      background: #00d0dd;  
    }  
    .modal hr {  
      border-color: #444;  
      margin: 1em 0;  
    }  
    #promoMsg {  
      margin-top: 0.5em;  
      min-height: 1.2em;  
      font-weight: 700;  
    }  
    @keyframes fadeIn {  
      from {opacity: 0; transform: translateY(20px);}  
      to {opacity: 1; transform: translateY(0);}  
    }  
  </style>  
</head>  
<body>  
  <div class="container">  
    <h1>🔥 Курс «Блядо» PRO</h1>  
    <p>🚀 Освой криптовалюту с нуля и научись зарабатывать стабильно.<br>  
      Поддержка, проверенные стратегии, помощь на каждом шаге.</p>  
    <p><strong>Цена курса: <span id="price">550 грн</span></strong></p>  
    <a href="https://t.me/FredLegends" class="btn" target="_blank" id="buyBtn">Приобрести курс</a>  
  </div>    
  <footer>  
    <p style="margin-bottom: 6px; font-size: .9rem; color: #aaa;">  
      Для поддержки: <a href="https://t.me/ArbitrationCriptobt" style="color:#00f0ff;">напишите в Telegram</a>  
    </p>  
    © 2025 FredLegends. Данный сайт — в бета версии.  
  </footer>    
  <a href="https://t.me/ArbitrationCriptobt" class="telegram" target="_blank" aria-label="Telegram">  
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram"/>  
  </a>  
  <div class="theme-btn" onclick="toggleTheme()">🌙/☀️</div>  
  <div class="profile-btn" onclick="toggleProfile()">👤 Профиль</div>  
  <div class="modal" id="profileModal">  
    <h3>Профиль</h3>  
    <div id="profileView"></div>  
    <div style="margin-top:1em;">  
      <input type="text" id="promoCode" placeholder="Промокод" />  
      <button onclick="applyPromo()">Активировать промокод</button>  
      <div id="promoMsg"></div>  
    </div>  
    <button style="margin-top:1.5em;" onclick="toggleProfile()">⬅️ Назад</button>  
  </div>    
  <script>  
    let user = JSON.parse(localStorage.getItem('user')) || null;  
  
    function toggleTheme() {  
      const themeBtn = document.querySelector('.theme-btn');  
      const isDark = document.body.style.backgroundColor !== 'white';  
      if (isDark) {  
        document.body.style.backgroundColor = 'white';  
        document.body.style.color = '#000';  
        themeBtn.style.color = '#000';  
        themeBtn.style.backgroundColor = '#ddd';  
      } else {  
        document.body.style.backgroundColor = '#111';  
        document.body.style.color = '#fff';  
        themeBtn.style.color = '#fff';  
        themeBtn.style.backgroundColor = '#555';  
      }  
    }  
  
    function toggleProfile() {  
      const modal = document.getElementById('profileModal');  
      modal.classList.toggle('open');  
      renderProfile();  
    }  
  
    function renderProfile() {  
      const view = document.getElementById('profileView');  
      if (user) {  
        view.innerHTML = `  
          <div class="avatar" id="avatar" style="background-image:url(${user.avatar});"></div>  
          <p>Вы вошли как <strong>${user.nick}</strong></p>  
          <input type="text" id="editNick" value="${user.nick}" />  
          <button onclick="saveNick()">Сохранить ник</button>  
          <button style="margin-top:.5em;" onclick="logout()">Выйти</button>  
        `;  
        document.getElementById('avatar').onclick = changeAvatar;  
      } else {  
        view.innerHTML = `  
          <input type="text" id="regNick" placeholder="Ник" />  
          <input type="password" id="regPass" placeholder="Пароль" />  
          <input type="password" id="regPass2" placeholder="Подтвердите пароль" />  
          <button onclick="register()">Зарегистрироваться</button>  
          <hr />  
          <input type="text" id="loginNick" placeholder="Ник" />  
          <input type="password" id="loginPass" placeholder="Пароль" />  
          <button onclick="login()">Войти</button>  
        `;  
      }  
    }  
  
    function register() {  
      const nick = regNick.value.trim();  
      const pass = regPass.value;  
      const pass2 = regPass2.value;  
      if (!nick || !pass || !pass2) return alert('Заполните все поля');  
      if (pass !== pass2) return alert('Пароли не совпадают');  
      user = { nick, pass, avatar: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };  
      localStorage.setItem('user', JSON.stringify(user));  
      alert('Вы успешно зарегистрированы');  
      renderProfile();  
    }  
  
    function login() {  
      const nick = loginNick.value.trim();  
      const pass = loginPass.value;  
      if (!user || user.nick !== nick || user.pass !== pass) {  
        return alert('Неверный ник или пароль');  
      }  
      alert('Вы успешно вошли');  
      renderProfile();  
    }  
  
    function logout() {  
      if (confirm('Выйти из аккаунта?')) {  
        user = null;  
        localStorage.removeItem('user');  
        renderProfile();  
      }  
    }  
  
    function saveNick() {  
      const newNick = document.getElementById('editNick').value.trim();  
      if (!newNick) return alert('Ник не может быть пустым');  
      user.nick = newNick;  
      localStorage.setItem('user', JSON.stringify(user));  
      renderProfile();  
    }  
  
    function changeAvatar() {  
      const inp = document.createElement('input');  
      inp.type = 'file';  
      inp.accept = 'image/*';  
      inp.onchange = () => {  
        const file = inp.files[0];  
        const reader = new FileReader();  
        reader.onload = () => {  
          user.avatar = reader.result;  
          localStorage.setItem('user', JSON.stringify(user));  
          renderProfile();  
        };  
        reader.readAsDataURL(file);  
      };  
      inp.click();  
    }  
  
    function applyPromo() {  
      const code = promoCode.value.trim().toLowerCase();  
      if (code === 'courses') {  
        price.textContent = '165 грн';  
        promoMsg.innerHTML = '<span style="color:#0f0;">✅ Скидка 70% активирована!</span>';  
        confettiEffect();  
      } else {  
        promoMsg.innerHTML = '<span style="color:#f00;">❌ Неверный промокод</span>';  
      }  
    }  
  
    function confettiEffect() {  
      const duration = 1500;  
      const animationEnd = Date.now() + duration;  
      const colors = ['#0f0', '#0ff', '#00f', '#ff0', '#f0f'];  
      (function frame() {  
        const timeLeft = animationEnd - Date.now();  
        if (timeLeft <= 0) return;  
        for (let i = 0; i < 30; i++) {  
          createConfettiPiece(colors[Math.floor(Math.random() * colors.length)]);  
        }  
        requestAnimationFrame(frame);  
      })();  
      function createConfettiPiece(color) {  
        const confetti = document.createElement('div');  
        confetti.style.position = 'fixed';  
        confetti.style.width = '6px';  
        confetti.style.height = '10px';  
        confetti.style.backgroundColor = color;  
        confetti.style.left = (Math.random() * window.innerWidth) + 'px';  
        confetti.style.top = '0px';  
        confetti.style.opacity = '1';  
        confetti.style.borderRadius = '2px';  
        confetti.style.pointerEvents = 'none';  
        confetti.style.zIndex = '9999';  
        document.body.appendChild(confetti);  
        let fallDuration = 1000 + Math.random() * 1000;  
        let fallDistance = window.innerHeight + 20;  
        confetti.animate([  
          { transform: 'translateY(0px)', opacity: 1 },  
          { transform: `translateY(${fallDistance}px) rotate(${Math.random()*360}deg)`, opacity: 0 }  
        ], {  
          duration: fallDuration,  
          easing: 'ease-out'  
        });  
        setTimeout(() => {  
          confetti.remove();  
        }, fallDuration);  
      }  
    }  
  
    renderProfile();  
  </script>  
</body>  
</html>
